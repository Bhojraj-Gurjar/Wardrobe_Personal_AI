# Hybrid dev: infra + backend + frontend in Docker, ai-service on the host.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local-ai.yml up -d --build postgres redis qdrant backend frontend

services:
  backend:
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      AI_SERVICE_URL: http://host.docker.internal:8000
      AI_SERVICE_PUBLIC_URL: http://localhost:8000
      STORAGE_INTERNAL_BASE_URL: http://host.docker.internal:3000
    volumes: !reset
      - ./backend/uploads:/app/uploads
    depends_on: !reset
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

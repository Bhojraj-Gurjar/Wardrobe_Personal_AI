# Infrastructure only — run frontend, backend, and ai-service locally.
# Full stack: see docker-compose.apps.yml

services:
  postgres:
    image: postgres:16-alpine
    container_name: wardrobe-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wardrobe
      POSTGRES_PASSWORD: wardrobe
      POSTGRES_DB: wardrobe_db
    ports:
      - '5432:5432'
    volumes:
      - wardrobe_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wardrobe -d wardrobe_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wardrobe-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: wardrobe-qdrant
    restart: unless-stopped
    ports:
      - '6333:6333'
      - '6334:6334'
    volumes:
      - wardrobe_qdrant_data:/qdrant/storage

volumes:
  wardrobe_postgres_data:
  wardrobe_qdrant_data:
